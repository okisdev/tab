name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check
        run: cargo check --all

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Format
        run: cargo fmt --all -- --check
