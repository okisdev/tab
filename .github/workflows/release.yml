name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../tab_${GITHUB_REF_NAME}_darwin_${{ matrix.arch }}.tar.gz tab tab-daemon
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tab-darwin-${{ matrix.arch }}
          path: tab_*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum tab_*.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tab_*.tar.gz
            checksums.txt
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA_ARM64=$(sha256sum tab_${GITHUB_REF_NAME}_darwin_arm64.tar.gz | awk '{print $1}')
          SHA_AMD64=$(sha256sum tab_${GITHUB_REF_NAME}_darwin_amd64.tar.gz | awk '{print $1}')

          cat > tab.rb << FORMULA
          class Tab < Formula
            desc "Terminal autocomplete plugin with fuzzy history matching"
            homepage "https://github.com/okisdev/tab"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/okisdev/tab/releases/download/${GITHUB_REF_NAME}/tab_${GITHUB_REF_NAME}_darwin_arm64.tar.gz"
                sha256 "${SHA_ARM64}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/okisdev/tab/releases/download/${GITHUB_REF_NAME}/tab_${GITHUB_REF_NAME}_darwin_amd64.tar.gz"
                sha256 "${SHA_AMD64}"
              end
            end

            def install
              bin.install "tab"
              bin.install "tab-daemon"
            end

            def caveats
              <<~EOS
                To activate tab, add to your ~/.zshrc:
                  eval "\\\$(tab init zsh)"

                Then install the background service:
                  tab install
              EOS
            end

            service do
              run [opt_bin/"tab-daemon"]
              keep_alive true
              log_path var/"log/tab/daemon.log"
              error_log_path var/"log/tab/daemon.err.log"
            end

            test do
              assert_match "tab", shell_output("\#{bin}/tab --help")
            end
          end
          FORMULA

          # Fix indentation
          sed -i 's/^          //' tab.rb

      - name: Push to Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/okisdev/homebrew-tap.git tap
          cp tab.rb tap/Formula/tab.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tab.rb
          git commit -m "Update tab to ${GITHUB_REF_NAME}"
          git push
